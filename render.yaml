services:
  - type: web
    name: collageauto-backend
    env: python
    plan: free
    buildCommand: >
      pip install -r requirements.txt &&
      playwright install chromium --with-deps
    startCommand: "uvicorn server:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: PYTHONUNBUFFERED
        value: "1"
