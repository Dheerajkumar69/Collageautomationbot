services:
  - type: web
    name: collageauto-backend
    env: python
    plan: free
    buildCommand: >
      PIP_DISABLE_PIP_VERSION_CHECK=1 pip install -r requirements.txt &&
      PLAYWRIGHT_BROWSERS_PATH=/opt/render/project/src/.playwright-browsers python -m playwright install --only-shell chromium
    startCommand: "uvicorn server:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "/opt/render/project/src/.playwright-browsers"
      - key: RUN_QUEUE_MAX_DEPTH
        value: "5"
      - key: RUN_QUEUE_HEARTBEAT_SECONDS
        value: "5"
      - key: RUN_STREAM_HEARTBEAT_SECONDS
        value: "15"
      - key: BOT_NON_INTERACTIVE
        value: "1"
      - key: BOT_DISABLE_ERROR_ARTIFACTS
        value: "1"
      - key: BOT_SERVER_MODE
        value: "1"

  - type: worker
    name: collageauto-waker
    env: python
    plan: free
    buildCommand: "PIP_DISABLE_PIP_VERSION_CHECK=1 pip install -r requirements-worker.txt"
    startCommand: "python render_waker.py"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: WAKER_TARGET_URL
        value: "https://collageautomationbot.onrender.com"
      - key: WAKER_ENDPOINTS
        value: "/health,/"
      - key: WAKER_INTERVAL_SECONDS
        value: "840"
      - key: WAKER_TIMEOUT_SECONDS
        value: "20"
      - key: WAKER_RETRIES
        value: "3"
      - key: WAKER_RETRY_BACKOFF_SECONDS
        value: "5"
      - key: WAKER_FAILURE_RETRY_SECONDS
        value: "60"
      - key: WAKER_MAX_JITTER_SECONDS
        value: "20"
      - key: WAKER_LOG_LEVEL
        value: "INFO"
