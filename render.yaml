services:
  - type: web
    name: collageautomationbot
    env: python
    plan: free
    buildCommand: >
      PIP_DISABLE_PIP_VERSION_CHECK=1 pip install --no-cache-dir -r requirements.txt &&
      python -m playwright install chromium --only-shell
    startCommand: "uvicorn server:app --host 0.0.0.0 --port $PORT --workers 1 --loop uvloop --http httptools"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: RUN_QUEUE_MAX_DEPTH
        value: "3"
      - key: RUN_QUEUE_HEARTBEAT_SECONDS
        value: "5"
      - key: RUN_STREAM_HEARTBEAT_SECONDS
        value: "15"
      - key: BOT_NON_INTERACTIVE
        value: "1"
      - key: BOT_DISABLE_ERROR_ARTIFACTS
        value: "1"
      - key: BOT_SERVER_MODE
        value: "1"
      - key: BOT_TIMEZONE
        value: "Asia/Kolkata"
      - key: BOT_HEADFUL
        value: "0"
      - key: BOT_DRY_RUN
        value: "0"

  - type: worker
    name: collageauto-waker
    env: python
    plan: free
    buildCommand: "PIP_DISABLE_PIP_VERSION_CHECK=1 pip install --no-cache-dir -r requirements-worker.txt"
    startCommand: "python -u render_waker.py"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: WAKER_TARGET_URL
        value: "https://collageautomationbot.onrender.com"
      - key: WAKER_ENDPOINTS
        value: "/health"
      # ────────────────────────────────────────────────────────────────────────
      # For Always-On paid tier (no idle spin-down), waker is light maintenance.
      # Still pings periodically to catch cold-starts and ensure liveness logs.
      # ────────────────────────────────────────────────────────────────────────
      - key: WAKER_INTERVAL_SECONDS
        value: "1800"  # 30 min (can be longer since service stays up)
      - key: WAKER_TIMEOUT_SECONDS
        value: "10"    # reduced timeout
      - key: WAKER_MIN_JITTER_SECONDS
        value: "30"
      - key: WAKER_MAX_JITTER_SECONDS
        value: "60"
      - key: WAKER_STARTUP_DELAY_SECONDS
        value: "5"
      - key: WAKER_RETRIES
        value: "2"
      - key: WAKER_RETRY_BACKOFF_SECONDS
        value: "3"
      - key: WAKER_FAILURE_RETRY_SECONDS
        value: "60"
      - key: WAKER_ALERT_AFTER_FAILURES
        value: "5"
      - key: WAKER_PROCESS_HEARTBEAT_SECONDS
        value: "300"  # heartbeat every 5 min
