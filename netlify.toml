[build]
  command   = "npm run build"
  publish   = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION         = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# Rewrite all requests to Next.js handler (handled by plugin, but explicit for safety)
[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/___netlify-handler"
  status = 200
