[build]
  command   = "npm run build"
  publish   = "out"

[build.environment]
  NODE_VERSION              = "20"
  NEXT_TELEMETRY_DISABLED   = "1"
  NEXT_PUBLIC_API_URL       = "https://collageautomationbot.onrender.com"
  NPM_FLAGS                 = "--legacy-peer-deps"

# Serve all routes from index.html (required for static Next.js export)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Cache static assets aggressively (immutable)
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache app shell (1 day)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=86400"
