[build]
  command   = "npm run build"
  publish   = "out"

[build.environment]
  NODE_VERSION              = "20"
  NEXT_TELEMETRY_DISABLED   = "1"
  # Set this to your Render backend URL before deploying.
  # Example: "https://collageauto-backend.onrender.com"
  # You can also override this in the Netlify dashboard → Site settings → Environment variables.
  NEXT_PUBLIC_API_URL       = "https://collageautomationbot.onrender.com"
  NPM_FLAGS                 = "--legacy-peer-deps"

# Serve all routes from index.html (required for static Next.js export)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
